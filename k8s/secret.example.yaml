# ШАБЛОН секрета. НЕ коммить реальные значения.
# Применять:  kubectl apply -f secret.example.yaml  (после подстановки значений)
# Лучше — генерировать через `kubectl create secret generic app-secrets ...` или SealedSecrets/Vault.
apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: aigen
type: Opaque
stringData:
  DATABASE_URL: "postgresql+psycopg://USER:PASS@postgres:5432/genapi"
  REDIS_URL: "redis://redis:6379/0"
  CELERY_BROKER_URL: "redis://redis:6379/1"
  CELERY_RESULT_BACKEND: "redis://redis:6379/2"

  WEBHOOK_SIGNING_SECRET: "CHANGE-ME"
  INTERNAL_JWT_SECRET: "CHANGE-ME"

  S3_ENDPOINT_URL: "https://<acc>.r2.cloudflarestorage.com"
  S3_REGION: "auto"
  S3_BUCKET: "genapi"
  S3_ACCESS_KEY: "CHANGE-ME"
  S3_SECRET_KEY: "CHANGE-ME"
  S3_PUBLIC_URL: "https://cdn.example.com"
