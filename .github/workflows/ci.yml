name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-test:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: genapi
          POSTGRES_PASSWORD: genapi
          POSTGRES_DB: genapi
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U genapi"
          --health-interval 5s --health-timeout 3s --health-retries 10
    env:
      DATABASE_URL: postgresql+psycopg://genapi:genapi@localhost:5432/genapi
      REDIS_URL: redis://localhost:6379/0
      CELERY_BROKER_URL: redis://localhost:6379/1
      CELERY_RESULT_BACKEND: redis://localhost:6379/2
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt ruff pytest fakeredis
      - name: Lint
        run: ruff check app scripts tests
      - name: Migrations apply cleanly
        run: alembic upgrade head
      - name: Tests
        run: pytest -q
