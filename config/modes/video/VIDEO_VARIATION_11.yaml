# ============================================================
#  VIDEO_VARIATION_11 РІРӮвҖқ turn_to_camera
#  Р В Р ВөР Т‘Р В°Р С”РЎвҖҡР С‘РЎРӮРЎС“Р ВөРЎвҖҡРЎРғРЎРҸ Р С”Р С•Р Р…РЎвҖҡР ВөР Р…РЎвҖҡ-Р СҳР ВөР Р…Р ВөР Т‘Р В¶Р ВөРЎРӮР С•Р Сҳ: Р СҳР ВөР Р…РЎРҸР в„– Р СһР СӣР вҖәР В¬Р СҷР Сӣ prompt_template /
#  negative_prompt / params. Р РҮР С”Р С•РЎРӮРЎРҸ "keep SAME face/identity/location" Р СңР вҖў РЎС“Р Т‘Р В°Р В»РЎРҸРЎвҖҡРЎРҠ.
# ============================================================
id: VIDEO_VARIATION_11
type: video
enabled: true

model: video_generation_model    # Р С”Р В»РЎРӢРЎвҖЎ Р С‘Р В· config/models.yaml (Wan 2.2 i2v)
workflow: video_i2v              # config/workflows/video_i2v.json

params:
  width: 480
  height: 832
  num_frames: 81        # ~5 c Р С—РЎРӮР С‘ 16 fps
  fps: 16
  steps: 8              # lightning: Р ВұР В°Р В»Р В°Р Р…РЎРғ РЎРғР С”Р С•РЎРӮР С•РЎРғРЎвҖҡРЎРҠ/Р С”Р В°РЎвҖЎР ВөРЎРғРЎвҖҡР РҶР С•
  cfg: 1.0              # РЎРғ lightning-LoRA cfg=1.0
  seed: 0

preserve_face: true
reference_strength: 0.85

prompt_template: |
  Animate the person from the reference image into a short realistic 5-second video.
  Keep the SAME face and identity across ALL frames; the person must stay recognizable.
  Keep the SAME location and background as in the source image; do not change the scene.
  Motion: the person turns their head to the camera and gives a soft smile.
  {{ metadata.change | default('') }}
  photorealistic, consistent identity, smooth natural motion, stable face and correct hands.

negative_prompt: |
  identity drift, morphing face, different person, deformed or distorted face,
  extra fingers, bad hands, deformed limbs, flicker, warping background, changed location,
  extra people, duplicate, text, watermark, lowres, blurry