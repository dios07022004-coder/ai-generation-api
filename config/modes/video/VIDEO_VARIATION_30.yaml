# ============================================================
#  VIDEO_VARIATION_30 — редактируется контент-менеджером.
#  Меняй ТОЛЬКО prompt_template / negative_prompt / params.
#  Якоря "keep the SAME face/identity/location" НЕ удалять.
# ============================================================
id: VIDEO_VARIATION_30
type: video
enabled: true

model: video_generation_model    # ключ из config/models.yaml (i2v: LTX / Wan / CogVideoX)
workflow: video_i2v              # config/workflows/video_i2v.json

params:
  width: 768
  height: 768
  num_frames: 49
  fps: 16
  seed: 0

preserve_face: true
reference_strength: 0.85

prompt_template: |
  Animate the person from the reference image into a short natural video.
  Keep the SAME face and identity across ALL frames; the person must stay recognizable.
  Keep the SAME location and background as in the source image; do not change the scene.
  {{ metadata.change | default('subtle natural motion, gentle camera movement') }}.
  photorealistic, consistent identity, smooth motion, stable face.

negative_prompt: |
  identity drift, morphing face, different person, distorted or deformed face, flicker,
  warping background, changed location, extra people, duplicate, text, watermark,
  lowres, blurry
