# Сохраняем ПОЛЬЗОВАТЕЛЯ, с референса берём позу/одежду/выражение:
#   ЛИЦО, ВОЛОСЫ/ГОЛОВА, ФОН/ЛОКАЦИЯ, ТЕЛОСЛОЖЕНИЕ → с фото юзера (img2img базы = его фото)
#   ПОЗА → ControlNet OpenPose(референс);  ОДЕЖДА → IP-Adapter(референс)
#   ВЫРАЖЕНИЕ ЛИЦА → OpenPose face-keypoints(референс);  точное ЛИЦО → ReActor(фото юзера)
#   image_url        = фото пользователя  → {{image_name}}
#   reference_urls[0] = референс           → {{reference_0_name}}
# Граф: config/workflows/photo_template.json (img2img юзера + ControlNet + IP-Adapter + ReActor).
id: PHOTO_TEMPLATE
type: photo
enabled: true                      # workflow photo_template.json готов (InstantID+OpenPose+IP-Adapter)

model: photo_face_model            # RealVisXL (реализм)
workflow: photo_template           # config/workflows/photo_template.json (экспорт из ComfyUI)

params:
  width: 1024
  height: 1024
  steps: 35
  cfg: 4.5
  seed: 0
  pose_strength: 1.0               # ПОЗА с референса (ControlNet); поза не совпала → ↑ до 1.2-1.3
  depth_strength: 0.55             # (не используется в текущем графе)
  ipadapter_strength: 0.9          # ОДЕЖДА с референса (IP-Adapter); одежда не та → ↑ до 1.0-1.1
  bg_denoise: 0.65                 # сколько менять твоё фото: голова/фон уходят → ↓ 0.55; поза слабая → ↑ 0.7

preserve_face: true
reference_strength: 1.0            # InstantID — лицо пользователя

prompt_template: |
  candid amateur photo, natural daylight, realistic skin with visible pores,
  slight film grain, true-to-life colors, photorealistic.
  {{ metadata.change | default('') }}

negative_prompt: |
  airbrushed, smooth skin, plastic skin, retouched, beauty filter, studio lighting,
  cartoon, anime, 3d, cgi, render, doll, deformed face, extra fingers, bad hands,
  blurry, lowres, jpeg artifacts, watermark, text
