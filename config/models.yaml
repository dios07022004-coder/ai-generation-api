# Логические имена моделей → реальные настройки.
# Режимы (config/modes/*) ссылаются на ключи отсюда полем `model`.
# Менять модель можно здесь, не трогая код.

photo_generation_model:
  name: sd_xl_base_1.0.safetensors     # checkpoint в ComfyUI (его качает bootstrap)
  type: image                          # работает с workflow sdxl_txt2img / sdxl_img2img
  steps: 28
  cfg: 4.0
  sampler: euler

photo_face_model:
  name: RealVisXL_V5.0_fp16.safetensors  # фотореалистичный SDXL для InstantID (макс. реализм)
  type: image
  steps: 35
  cfg: 4.5

video_generation_model:
  name: wan2.2_i2v_14B                  # единая базовая модель для VIDEO_VARIATION_1..40
  type: video                          # workflow video_i2v: high/low/clip/vae заданы внутри workflow
  steps: 8                             # 8 шагов (lightning) — баланс скорость/качество на 4090
  cfg: 1.0                             # с lightning-LoRA cfg обязан быть 1.0
  fps: 16

# Рекомендуемый стек файлов для Wan i2v в ComfyUI (через workflow-ноды):
