# Цена ОДНОЙ генерации в кредитах (1 кредит = 1 ₽). ТОЛЬКО целые числа.
# Что платит партнёр владельцу за генерацию (оптовая цена).
# Приоритет (выше — главнее): price_overrides у ключа (в БД) → api_keys здесь →
#   modes здесь → defaults здесь. Нет цены → отказ (fail-closed, никогда не бесплатно).

defaults:
  video: 40           # фото не указываем → партнёрам фото не продаём (отклонится)
  # photo: 10         # раскомментируй, если решишь продавать и фото

modes: {}             # переопределение по режиму, напр.:
                      #   VIDEO_VARIATION_7: 45

api_keys: {}          # переопределение по партнёру (id ключа), напр.:
                      #   ab12cd34...: { video: 35 }
