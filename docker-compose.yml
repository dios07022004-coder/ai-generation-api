services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: genapi
      POSTGRES_PASSWORD: genapi
      POSTGRES_DB: genapi
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U genapi"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped

  migrate:
    build: .
    command: alembic upgrade head
    env_file: .env
    environment:
      - DATABASE_URL=postgresql+psycopg://genapi:genapi@postgres:5432/genapi
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"   # доступ к ComfyUI на хосте (Linux)
    env_file: .env
    environment:
      - DATABASE_URL=postgresql+psycopg://genapi:genapi@postgres:5432/genapi
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./storage:/app/storage
      - ./config:/app/config
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      migrate:
        condition: service_completed_successfully

  worker:
    build: .
    command: celery -A app.queues.celery_app worker -l info -Q generation,generation_video --concurrency=1
    extra_hosts:
      - "host.docker.internal:host-gateway"   # доступ к ComfyUI на хосте (Linux)
    env_file: .env
    environment:
      - DATABASE_URL=postgresql+psycopg://genapi:genapi@postgres:5432/genapi
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./storage:/app/storage
      - ./config:/app/config
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      migrate:
        condition: service_completed_successfully
    # На GPU-сервере добавить:
    #   deploy:
    #     resources:
    #       reservations:
    #         devices: [{ driver: nvidia, count: all, capabilities: [gpu] }]

  # ComfyUI на GPU-сервере (раскомментировать при GENERATION_PROVIDER=comfyui):
  # comfyui:
  #   image: <your-comfyui-image>
  #   ports: ["8188:8188"]
  #   deploy:
  #     resources:
  #       reservations:
  #         devices: [{ driver: nvidia, count: all, capabilities: [gpu] }]

volumes:
  pgdata:
