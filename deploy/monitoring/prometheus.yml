global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - alert_rules.yml

scrape_configs:
  - job_name: ai-generation-api
    metrics_path: /metrics
    static_configs:
      - targets: ["api:8000"]      # в k8s — через service discovery / annotations

  # GPU-метрики собирает dcgm-exporter на GPU-нодах:
  - job_name: dcgm
    static_configs:
      - targets: ["dcgm-exporter:9400"]

  - job_name: redis
    static_configs:
      - targets: ["redis-exporter:9121"]
